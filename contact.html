<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demander une démo — LodgePro Pro</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0B1F3A; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:white; border-radius:16px; padding:40px; max-width:500px; width:100%; }
.logo { text-align:center; margin-bottom:28px; }
.logo span { font-size:28px; font-weight:900; color:#0B1F3A; }
.logo span em { color:#7C3AED; font-style:normal; }
.badge { display:inline-block; background:#EDE9FE; color:#7C3AED; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-top:4px; letter-spacing:1px; }
h2 { font-size:22px; color:#0B1F3A; margin-bottom:8px; text-align:center; }
p { color:#6B7280; font-size:14px; text-align:center; margin-bottom:28px; }
label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px; }
input, select, textarea { width:100%; padding:12px; border:1px solid #E5E7EB; border-radius:8px; font-size:14px; color:#111; margin-bottom:16px; }
input:focus, select:focus, textarea:focus { outline:none; border-color:#7C3AED; }
textarea { height:80px; resize:vertical; }
button { width:100%; background:#7C3AED; color:white; padding:14px; border:none; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; }
button:hover { background:#6D28D9; }
.success { display:none; text-align:center; padding:20px; }
.success h3 { color:#7C3AED; font-size:20px; margin:12px 0 8px; }
.success p { color:#6B7280; }
.note { font-size:12px; color:#9CA3AF; text-align:center; margin-top:12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span>Lodge<em>Pro</em></span><br>
    <span class="badge">PRO</span>
  </div>

  <div id="form-section">
    <h2>Demander une démo gratuite</h2>
    <p>Remplissez ce formulaire — nous vous recontactons sous 24h.</p>

    <form id="contact-form">
      <label>Nom et Prénom *</label>
      <input type="text" id="nom" placeholder="Marie Dupont" required>

      <label>Email *</label>
      <input type="email" id="email" placeholder="marie@concierge.fr" required>

      <label>Téléphone</label>
      <input type="tel" id="tel" placeholder="+33 6 12 34 56 78">

      <label>Société</label>
      <input type="text" id="societe" placeholder="Riviera Conciergerie">

      <label>Nombre de propriétés gérées *</label>
      <select id="nb" required>
        <option value="">Sélectionnez...</option>
        <option value="5-20">5 à 20 propriétés</option>
        <option value="20-50">20 à 50 propriétés</option>
        <option value="50-100">50 à 100 propriétés</option>
        <option value="100+">Plus de 100 propriétés</option>
      </select>

      <label>Message (optionnel)</label>
      <textarea id="message" placeholder="Décrivez votre situation actuelle..."></textarea>

      <button type="submit" id="btn">✉️ Envoyer ma demande →</button>
      <p class="note" id="error" style="color:#EF5350;display:none"></p>
    </form>
  </div>

  <div class="success" id="success-section">
    <div style="font-size:48px">🎉</div>
    <h3>Demande envoyée !</h3>
    <p>Nous vous recontactons sous 24h à l'adresse indiquée.<br><br>
    En attendant, testez la démo avec le code <b style="color:#7C3AED">pro2026</b> sur<br>
    <a href="https://vacances-locations-pro-iqmuq8xq9g3kxgw6n8ogpv.streamlit.app" style="color:#7C3AED">l'application LodgePro Pro</a></p>
  </div>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.style.display = 'none';

  const nom     = document.getElementById('nom').value.trim();
  const email   = document.getElementById('email').value.trim();
  const tel     = document.getElementById('tel').value.trim();
  const societe = document.getElementById('societe').value.trim();
  const nb      = document.getElementById('nb').value;
  const message = document.getElementById('message').value.trim();

  if (!nom || !email || !nb) {
    err.textContent = 'Veuillez remplir les champs obligatoires.';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Envoi en cours...';
  btn.disabled = true;

  try {
    // Envoyer vers Make.com webhook
    await fetch('https://hook.eu1.make.com/4hovebj947l3xz0fzzotnvwl8ul92p30', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom, email, tel, societe, nb_proprietes: nb, message, source: 'contact_pro' })
    });
  } catch(ex) {}

  // Afficher succès
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('success-section').style.display = 'block';
});
</script>
</body>
</html>
